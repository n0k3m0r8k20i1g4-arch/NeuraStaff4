<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI社員一覧 - Workspace Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --bg-color:#0a0a0a;
  --accent-orange:#ff6a00;
  --glass-white:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background-color:var(--bg-color);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;}
.header{width:100%;max-width:420px;background:var(--glass-white);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--glass-border);border-radius:24px;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;margin:20px 0;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.logo{display:flex;align-items:center;gap:14px;font-size:1.35rem;font-weight:700;}
.logo-box{width:42px;height:42px;background:rgba(255,255,255,0.95);color:#000;border-radius:12px;display:flex;justify-content:center;align-items:center;box-shadow:0 4px 12px rgba(255,106,0,0.3);}
.hamburger{cursor:pointer;font-size:28px;color:#fff;transition:all 0.3s ease;}
.hamburger:hover{color:var(--accent-orange);transform:scale(1.1);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;width:100%;max-width:420px;}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:8px;background:var(--glass-white);backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-radius:20px;padding:16px;cursor:pointer;transition:all 0.3s ease;}
.grid-item:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 8px 24px rgba(255,106,0,0.3);}
.material-symbols-rounded{font-size:32px;color:rgba(255,255,255,0.9);transition:color 0.3s;}
.grid-item:hover .material-symbols-rounded{color:var(--accent-orange);}
.label{font-size:0.9rem;color:rgba(255,255,255,0.85);text-align:center;font-weight:500;}
.nav-panel{position:fixed;top:0;left:-260px;width:260px;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,0.2);transition:left 0.4s ease;z-index:1000;display:flex;flex-direction:column;}
.nav-panel.open{left:0;}
.nav-header{display:flex;justify-content:space-between;align-items:center;padding:16px;font-weight:700;font-size:1.1rem;border-bottom:1px solid rgba(255,255,255,0.1);}
.nav-close{cursor:pointer;font-weight:bold;font-size:20px;}
.nav-list{padding:12px;display:flex;flex-direction:column;gap:12px;}
.nav-list a{color:#fff;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:12px;transition:all 0.3s ease;}
.nav-list a:hover{background:rgba(255,106,0,0.18);}
</style>
</head>
<body>

<header class="header">
<div class="hamburger" id="hamburger">☰</div>
<div class="logo">
<div class="logo-box"><span class="material-symbols-rounded">auto_awesome</span></div>
<span>AI社員 Workspace</span>
</div>
</header>

<h2>AI社員一覧</h2>
<div class="grid" id="employeeGrid">
  <!-- JSで動的に埋める -->
</div>

<!-- ハンバーガーナビ -->
<div id="navPanel" class="nav-panel">
<div class="nav-header"><span>メニュー</span><span id="navClose" class="nav-close">×</span></div>
<div class="nav-list">
<a href="index.html">ホーム</a>
<a href="#">タスク管理</a>
<a href="#">設定</a>
<a href="#">ログアウト</a>
</div>
</div>

<script>
const hamburger=document.getElementById("hamburger");
const navPanel=document.getElementById("navPanel");
const navClose=document.getElementById("navClose");
hamburger.addEventListener("click",()=>navPanel.classList.add("open"));
navClose.addEventListener("click",()=>navPanel.classList.remove("open"));

// 仮のAI社員データ
const employees=[
  {name:"Python Bot",icon:"smart_toy"},
  {name:"Django Bot",icon:"code"},
  {name:"FastAPI Bot",icon:"rocket"},
  {name:"Celery Bot",icon:"schedule"},
  {name:"SQLAlchemy Bot",icon:"storage"},
  {name:"Docker Bot",icon:"layers"}
];

const grid=document.getElementById("employeeGrid");
employees.forEach(emp=>{
  const div=document.createElement("div");
  div.className="grid-item";
  div.innerHTML=`<div class="icon-box"><span class="material-symbols-rounded">${emp.icon}</span></div><div class="label">${emp.name}</div>`;
  grid.appendChild(div);
});
</script>
</body>
</html>
