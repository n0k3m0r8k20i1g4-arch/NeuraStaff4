<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI社員 Workspace Pro</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
:root{
  --bg-color:#0a0a0a;
  --accent-orange:#ff6a00;
  --glass-white:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background-color:var(--bg-color);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;overflow-x:hidden;position:relative;}
.glow-1{position:fixed;top:15%;left:20%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,106,0,0.15)0%,transparent 65%);filter:blur(90px);z-index:-1;animation:float 14s infinite alternate ease-in-out;}
.glow-2{position:fixed;bottom:20%;right:15%;width:420px;height:420px;background:radial-gradient(circle,rgba(255,140,0,0.10)0%,transparent 70%);filter:blur(80px);z-index:-1;}
@keyframes float{0%{transform:translate(0,0);}100%{transform:translate(8%,12%);}}

.header{width:100%;max-width:420px;background:var(--glass-white);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border:1px solid var(--glass-border);border-radius:24px;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;margin:20px 0 40px 0;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.logo{display:flex;align-items:center;gap:14px;font-size:1.35rem;font-weight:700;letter-spacing:-0.03em;}
.logo-box{width:42px;height:42px;background:rgba(255,255,255,0.95);color:#000;border-radius:12px;display:flex;justify-content:center;align-items:center;box-shadow:0 4px 12px rgba(255,106,0,0.3);}
.hamburger{cursor:pointer;font-size:28px;color:#fff;transition:all 0.3s ease;}
.hamburger:hover{color:var(--accent-orange);transform:scale(1.1);}

.search-card{width:100%;max-width:420px;background:var(--glass-white);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid var(--glass-border);border-radius:32px;padding:32px 28px;box-shadow:0 25px 50px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.15);margin-bottom:48px;}
.input-placeholder{color:rgba(255,255,255,0.45);font-size:1.1rem;margin-bottom:28px;line-height:1.4;}
.action-bar{display:flex;justify-content:space-between;align-items:center;}
.btn-icon{width:52px;height:52px;border-radius:50%;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);display:flex;justify-content:center;align-items:center;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);}
.btn-icon:hover{background:rgba(255,255,255,0.18);transform:scale(1.08);}
.btn-primary{background:#fff;color:#000;padding:14px 28px;border-radius:9999px;font-weight:700;font-size:1rem;display:flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 8px 20px rgba(255,106,0,0.3);transition:all 0.3s ease;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(255,106,0,0.4);}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;width:100%;max-width:420px;}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;}
.icon-box{width:64px;height:64px;border-radius:50%;background:var(--glass-white);backdrop-filter:blur(30px);border:1px solid var(--glass-border);display:flex;justify-content:center;align-items:center;box-shadow:0 8px 20px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.2);transition:all 0.4s cubic-bezier(0.4,0,0.2,1);}
.grid-item:hover .icon-box{background:rgba(255,106,0,0.15);border-color:var(--accent-orange);transform:translateY(-6px) scale(1.08);box-shadow:0 12px 28px rgba(255,106,0,0.25),inset 0 1px 0 rgba(255,255,255,0.3);}
.material-symbols-rounded{font-size:28px;color:rgba(255,255,255,0.9);transition:color 0.3s ease;}
.grid-item:hover .material-symbols-rounded{color:var(--accent-orange);}
.label{font-size:0.75rem;color:rgba(255,255,255,0.65);text-align:center;font-weight:500;}
.highlight .icon-box{background:rgba(255,106,0,0.18);border:1px solid var(--accent-orange);box-shadow:0 8px 20px rgba(255,106,0,0.3),inset 0 1px 0 rgba(255,255,255,0.25);}
.highlight .material-symbols-rounded{color:var(--accent-orange);}

/* 世界最高水準ハンバーガー */
.nav-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.3s ease;z-index:900;}
.nav-overlay.active{opacity:1;pointer-events:auto;}
.nav-panel{position:fixed;top:0;left:-300px;width:300px;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(24px);border-right:1px solid rgba(255,255,255,0.2);transition:left 0.4s cubic-bezier(0.4,0,0.2,1);z-index:1000;display:flex;flex-direction:column;}
.nav-panel.open{left:0;}
.nav-header{display:flex;justify-content:space-between;align-items:center;padding:16px;font-weight:700;font-size:1.1rem;border-bottom:1px solid rgba(255,255,255,0.1);}
.nav-close{cursor:pointer;font-weight:bold;font-size:24px;transition:all 0.3s ease;}
.nav-close:hover{color:var(--accent-orange);}
.nav-list{padding:12px;display:flex;flex-direction:column;gap:12px;}
.nav-list a{color:#fff;text-decoration:none;font-weight:500;padding:8px 12px;border-radius:12px;transition:all 0.3s ease;}
.nav-list a:hover{background:rgba(255,106,0,0.18);}
.nav-list .has-submenu{position:relative;cursor:pointer;}
.nav-list .submenu{display:none;flex-direction:column;gap:8px;margin-left:12px;}
.nav-list .submenu a{padding-left:20px;}
.nav-list .has-submenu.open>.submenu{display:flex;}
</style>
</head>
<body>
<div class="glow-1"></div>
<div class="glow-2"></div>

<header class="header">
<div class="hamburger" id="hamburger" aria-label="メニュー" aria-expanded="false" aria-controls="navPanel">☰</div>
<div class="logo">
<div class="logo-box"><span class="material-symbols-rounded">auto_awesome</span></div>
<span>AI社員 Workspace</span>
</div>
</header>

<main class="search-card">
<div class="input-placeholder">AI社員に新しいタスクを依頼する</div>
<div class="action-bar">
<div class="btn-icon"><span class="material-symbols-rounded">add</span></div>
<div class="btn-primary"><span class="material-symbols-rounded" style="font-size:22px;">mic</span>話して指示</div>
</div>
</main>

<div class="grid">
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">description</span></div><div class="label">会議録作成</div></div>
<div class="grid-item highlight"><div class="icon-box"><span class="material-symbols-rounded">tactic</span></div><div class="label">戦略提案</div></div>
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">table_chart</span></div><div class="label">データ抽出</div></div>
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">mail</span></div><div class="label">メール代行</div></div>
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">smart_toy</span></div><div class="label">常駐チャット</div></div>
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">palette</span></div><div class="label">画像生成</div></div>
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">translate</span></div><div class="label">同時翻訳</div></div>
<div class="grid-item"><div class="icon-box"><span class="material-symbols-rounded">grid_view</span></div><div class="label">全スキル</div></div>
</div>

<!-- ナビオーバーレイ -->
<div id="navOverlay" class="nav-overlay" tabindex="-1"></div>

<!-- ハンバーガーナビ -->
<div id="navPanel" class="nav-panel" role="navigation" aria-hidden="true">
<div class="nav-header"><span>メニュー</span><span id="navClose" class="nav-close">×</span></div>
<div class="nav-list">
<a href="#">AI社員一覧 ＞</a>
<a href="#">タスク管理</a>
<a href="#">設定</a>
<a href="#">ログアウト</a>
<div class="has-submenu">開発環境
  <div class="submenu">
    <a href="#">Python / Django</a>
    <a href="#">Node / FastAPI</a>
    <a href="#">Docker / Kubernetes</a>
  </div>
</div>
</div>
</div>

<script>
const hamburger=document.getElementById("hamburger");
const navPanel=document.getElementById("navPanel");
const navClose=document.getElementById("navClose");
const navOverlay=document.getElementById("navOverlay");
hamburger.addEventListener("click",()=>{
  navPanel.classList.add("open");
  navOverlay.classList.add("active");
  hamburger.setAttribute("aria-expanded","true");
  navPanel.setAttribute("aria-hidden","false");
});
const closeNav=()=>{
  navPanel.classList.remove("open");
  navOverlay.classList.remove("active");
  hamburger.setAttribute("aria-expanded","false");
  navPanel.setAttribute("aria-hidden","true");
};
navClose.addEventListener("click",closeNav);
navOverlay.addEventListener("click",closeNav);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeNav();});
document.querySelectorAll(".has-submenu").forEach(el=>{
  el.addEventListener("click",()=>el.classList.toggle("open"));
});
</script>
</body>
  </html>
